name: Monthly Model Retrain

on:
  schedule:
    # 매월 1일 KST 07:00 = UTC 22:00 (전일 말일)
    - cron: "0 22 1 * *"
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Train model
        working-directory: pipeline
        run: python train_model.py
        env:
          PYTHONPATH: .

      - name: Copy market data to web
        run: |
          mkdir -p web/public/data
          cp data/market/latest_market.json web/public/data/ 2>/dev/null || true

      - name: Commit and push model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/models/ data/ web/public/data/
          git diff --staged --quiet || git commit -m "retrain: monthly model update $(date +%Y-%m)"
          git push
