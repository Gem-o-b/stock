name: Daily KOSPI Prediction

on:
  schedule:
    # 매일 KST 08:00 = UTC 23:00 (전일)
    - cron: "0 23 * * 0-4"  # 일~목 UTC = 월~금 KST
    # 매일 KST 14:00 = UTC 05:00
    - cron: "0 5 * * 1-5"  # 월~금 UTC = 월~금 KST
    # 매일 KST 18:00 = UTC 09:00
    - cron: "0 9 * * 1-5"  # 월~금 UTC = 월~금 KST
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run prediction
        working-directory: pipeline
        run: python predict.py
        env:
          PYTHONPATH: .

      - name: Copy data to web/public/data
        run: |
          mkdir -p web/public/data
          cp data/predictions/predictions.json web/public/data/
          cp data/accuracy/accuracy.json web/public/data/
          cp data/market/latest_market.json web/public/data/

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/public/data/
          git diff --staged --quiet || git commit -m "prediction: $(date +%Y-%m-%d) daily prediction"
          git push
